<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Dan — Get in Touch">
    <meta name="viewport" content="width=device-width">
    <title>Contact | Dan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        const theme = (() => {
            if (typeof localStorage !== 'undefined' && localStorage.getItem('theme')) {
                return localStorage.getItem('theme');
            }
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                return 'dark';
            }
            return 'light';
        })();
        if (theme === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
        window.localStorage.setItem('theme', theme);
    </script>
</head>
<body>

    <nav>
        <div class="nav-inner">
            <div class="nav-links">
                <a href="index.html">[/]</a>
                <a href="experience.html">[/experience]</a>
                <a href="skills.html">[/skills]</a>
                <a href="projects.html">[/projects]</a>
                <a href="contact.html" class="active">[/contact]</a>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <span class="theme-toggle-light">[☀]</span>
                <span class="theme-toggle-dark" style="display: none;">[☾]</span>
            </button>
        </div>
    </nav>

    <main>

</body>
</html>
